<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kuhching.app — Simple solutions</title>
  <meta name="description" content="Kuhching.app builds simple, scalable, and smart tech solutions that help businesses grow." />
  <style>
    :root {
      --yellow: #ffc400;
      --yellow-2: #ffd84a;
      --yellow-3: #fff1a8;
      --dark: #0f1722;
      --dark-2: #162231;
      --text: #111827;
      --muted: #5e6774;
      --white: #ffffff;
      --line: rgba(255, 196, 0, 0.32);
      --shadow: 0 26px 90px rgba(15, 23, 34, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 9% 62%, rgba(255, 196, 0, 0.28), transparent 19rem),
        radial-gradient(circle at 91% 68%, rgba(255, 196, 0, 0.22), transparent 20rem),
        linear-gradient(180deg, #ffffff 0%, #fffdf5 55%, #fff4bd 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 42vw;
      max-width: 620px;
      min-width: 320px;
      height: 42vw;
      max-height: 620px;
      min-height: 320px;
      border-radius: 50%;
      z-index: -2;
      filter: blur(42px);
      animation: floatGlow 12s ease-in-out infinite alternate;
    }

    body::before {
      left: -18vw;
      bottom: -7vw;
      background: rgba(255, 196, 0, 0.22);
    }

    body::after {
      right: -16vw;
      bottom: -9vw;
      background: rgba(255, 216, 74, 0.2);
      animation-delay: -6s;
    }

    a {
      color: inherit;
    }

    .page {
      position: relative;
      width: min(1440px, calc(100% - 48px));
      margin: 0 auto;
    }

    .page::before,
    .page::after {
      content: "";
      position: absolute;
      top: 245px;
      width: clamp(230px, 26vw, 410px);
      height: clamp(230px, 26vw, 410px);
      pointer-events: none;
      opacity: 0.78;
      background-repeat: no-repeat;
      background-size: contain;
      animation: circuitDrift 8s ease-in-out infinite alternate;
    }

    .page::before {
      left: -48px;
      background-image:
        linear-gradient(90deg, transparent 0 12%, var(--line) 12% 62%, transparent 62%),
        linear-gradient(90deg, transparent 0 22%, var(--line) 22% 72%, transparent 72%),
        linear-gradient(90deg, transparent 0 8%, var(--line) 8% 54%, transparent 54%),
        radial-gradient(circle at 56% 19%, var(--yellow) 0 5px, transparent 6px),
        radial-gradient(circle at 69% 46%, var(--yellow) 0 4px, transparent 5px),
        radial-gradient(circle at 41% 70%, rgba(255,196,0,.7) 0 4px, transparent 5px);
      background-position: 0 28%, 0 42%, 0 58%, 0 0, 0 0, 0 0;
      background-size: 100% 1px, 100% 1px, 100% 1px, 100% 100%, 100% 100%, 100% 100%;
    }

    .page::after {
      right: -48px;
      transform: scaleX(-1);
      background-image:
        linear-gradient(90deg, transparent 0 12%, var(--line) 12% 62%, transparent 62%),
        linear-gradient(90deg, transparent 0 22%, var(--line) 22% 72%, transparent 72%),
        linear-gradient(90deg, transparent 0 8%, var(--line) 8% 54%, transparent 54%),
        radial-gradient(circle at 56% 19%, var(--yellow) 0 5px, transparent 6px),
        radial-gradient(circle at 69% 46%, var(--yellow) 0 4px, transparent 5px),
        radial-gradient(circle at 41% 70%, rgba(255,196,0,.7) 0 4px, transparent 5px);
      background-position: 0 28%, 0 42%, 0 58%, 0 0, 0 0, 0 0;
      background-size: 100% 1px, 100% 1px, 100% 1px, 100% 100%, 100% 100%, 100% 100%;
      animation-delay: -4s;
    }

    header {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 42px;
      padding: 28px 0 18px;
      animation: slideDown 700ms ease both;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 950;
      letter-spacing: -0.06em;
      color: var(--dark);
    }

    .brand-text,
    .hero-logo,
    .footer-logo {
      white-space: nowrap;
    }

    .brand-text {
      font-size: clamp(1.55rem, 3vw, 2.65rem);
      line-height: 1;
    }

    .cent-ch {
      position: relative;
      display: inline-block;
      width: 0.78em;
      height: 0.96em;
      margin: 0 -0.01em;
      color: var(--yellow);
      vertical-align: -0.04em;
      filter: drop-shadow(0 12px 24px rgba(255, 196, 0, 0.28));
    }

    .cent-ch::before {
      content: "";
      position: absolute;
      inset: 0.08em 0.04em 0.08em 0.02em;
      border: 0.14em solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
    }

    .cent-ch::after {
      content: "";
      position: absolute;
      left: 45%;
      top: -0.09em;
      width: 0.12em;
      height: 1.16em;
      border-radius: 999px;
      background: currentColor;
      transform: translateX(-50%);
    }

    .cent-h {
      position: absolute;
      right: -0.03em;
      top: 0.23em;
      width: 0.35em;
      height: 0.48em;
      border-right: 0.13em solid currentColor;
      border-top: 0.13em solid currentColor;
      border-radius: 0 0.18em 0 0;
    }

    .app-dot {
      color: var(--yellow);
      font-weight: 500;
      letter-spacing: -0.05em;
    }

    nav {
      justify-self: center;
      display: flex;
      gap: clamp(20px, 3vw, 48px);
      align-items: center;
    }

    nav a {
      position: relative;
      color: var(--text);
      text-decoration: none;
      font-size: 0.98rem;
      font-weight: 650;
      transition: color 180ms ease, transform 180ms ease;
    }

    nav a::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -14px;
      width: 0;
      height: 3px;
      border-radius: 999px;
      background: var(--yellow);
      transform: translateX(-50%);
      transition: width 200ms ease;
    }

    nav a:hover,
    nav a.active {
      color: #d9a900;
      transform: translateY(-1px);
    }

    nav a:hover::after,
    nav a.active::after {
      width: 44px;
    }

    .nav-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 50px;
      padding: 0 24px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--yellow), var(--yellow-2));
      color: var(--dark);
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 16px 36px rgba(255, 196, 0, 0.32);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .nav-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 44px rgba(255, 196, 0, 0.42);
    }

    .hero {
      position: relative;
      z-index: 1;
      min-height: 635px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 72px 0 88px;
    }

    .spark {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--yellow);
      box-shadow: 0 0 0 5px rgba(255, 196, 0, 0.12);
      animation: sparkle 3.6s ease-in-out infinite;
    }

    .spark.one { left: 5%; top: 23%; }
    .spark.two { right: 14%; top: 28%; animation-delay: -1.3s; }
    .spark.three { right: 8%; bottom: 26%; animation-delay: -2.2s; }
    .spark.four { left: 12%; bottom: 18%; animation-delay: -2.8s; }

    .hero-logo {
      display: inline-block;
      font-size: clamp(4.5rem, 11vw, 10.4rem);
      line-height: 0.88;
      letter-spacing: -0.085em;
      font-weight: 950;
      color: var(--dark);
      text-shadow: 0 18px 48px rgba(15, 23, 34, 0.12);
      animation: fadeUp 800ms cubic-bezier(.2,.8,.2,1) both 100ms;
    }

    .hero-logo .cent-ch {
      animation: coinEnter 950ms cubic-bezier(.2,.8,.2,1) both 500ms;
    }

    .hero-logo .app-dot {
      display: inline-block;
      margin-left: 0.04em;
      font-size: 0.42em;
      vertical-align: 0.1em;
    }

    .slogan {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(14px, 2vw, 28px);
      margin-top: 42px;
      font-size: clamp(1.9rem, 4vw, 3.35rem);
      line-height: 1;
      letter-spacing: 0.38em;
      text-transform: lowercase;
      color: var(--dark);
      font-weight: 420;
      animation: fadeUp 800ms ease both 260ms;
    }

    .slogan::before,
    .slogan::after {
      content: "";
      display: block;
      width: clamp(40px, 6vw, 76px);
      height: 4px;
      border-radius: 999px;
      background: var(--yellow);
    }

    .hero-copy {
      max-width: 620px;
      margin: 34px auto 0;
      color: #242c37;
      font-size: clamp(1.08rem, 1.8vw, 1.45rem);
      line-height: 1.42;
      animation: fadeUp 800ms ease both 390ms;
    }

    .hero-copy::before {
      content: "";
      display: block;
      width: 62px;
      height: 4px;
      margin: 0 auto 22px;
      border-radius: 999px;
      background: var(--yellow);
    }

    .hero-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 42px;
      animation: fadeUp 800ms ease both 520ms;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-width: 260px;
      min-height: 62px;
      padding: 0 28px;
      border-radius: 12px;
      font-size: 1.08rem;
      font-weight: 800;
      text-decoration: none;
      border: 1.5px solid transparent;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .button.primary {
      background: linear-gradient(135deg, var(--yellow), var(--yellow-2));
      color: var(--dark);
      box-shadow: 0 18px 42px rgba(255, 196, 0, 0.34);
    }

    .button.secondary {
      background: rgba(255, 255, 255, 0.74);
      border-color: rgba(255, 196, 0, 0.9);
      color: var(--dark);
      backdrop-filter: blur(12px);
    }

    .button:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 52px rgba(15, 23, 34, 0.16);
    }

    .services-band {
      position: relative;
      z-index: 2;
      margin-top: -2px;
      padding: 40px clamp(22px, 5vw, 64px) 54px;
      border-radius: 28px 28px 0 0;
      background:
        radial-gradient(circle at 50% 100%, rgba(255, 196, 0, 0.22), transparent 22%),
        linear-gradient(135deg, var(--dark), var(--dark-2));
      color: var(--white);
      box-shadow: 0 -14px 54px rgba(15, 23, 34, 0.16);
      overflow: hidden;
    }

    .services-band::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0 49.9%, rgba(255,196,0,.38) 50%, transparent 50.1%),
        radial-gradient(circle at 50% 100%, var(--yellow) 0 7px, transparent 8px);
      opacity: 0.65;
      pointer-events: none;
    }

    .band-title {
      position: relative;
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp 800ms ease both;
    }

    .band-title h2 {
      font-size: clamp(1.7rem, 3vw, 2.35rem);
      letter-spacing: -0.04em;
    }

    .band-title::after {
      content: "";
      display: block;
      width: 58px;
      height: 4px;
      margin: 18px auto 0;
      border-radius: 999px;
      background: var(--yellow);
    }

    .service-grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .service {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 22px;
      align-items: center;
      padding: 22px 30px;
      border-right: 1px solid rgba(255, 255, 255, 0.24);
      animation: fadeUp 800ms ease both;
    }

    .service:nth-child(2) { animation-delay: 90ms; }
    .service:nth-child(3) { animation-delay: 180ms; }
    .service:nth-child(4) { animation-delay: 270ms; border-right: 0; }

    .service-icon {
      width: 82px;
      height: 82px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 196, 0, 0.1);
      color: var(--yellow);
      box-shadow: inset 0 0 0 1px rgba(255, 196, 0, 0.12);
    }

    .service-icon svg {
      width: 42px;
      height: 42px;
      stroke: currentColor;
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .service h3 {
      font-size: 1.12rem;
      margin-bottom: 8px;
      letter-spacing: -0.035em;
    }

    .service p {
      color: rgba(255,255,255,0.72);
      line-height: 1.55;
      font-size: 0.98rem;
    }

    .bottom-line {
      position: relative;
      width: min(420px, 74%);
      height: 1px;
      margin: 46px auto 0;
      background: linear-gradient(90deg, transparent, rgba(255,196,0,.62), transparent);
    }

    .bottom-line::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--yellow);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 24px var(--yellow);
      animation: pulseDot 2.4s ease-in-out infinite;
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 28px 0;
      color: var(--muted);
      font-weight: 650;
    }

    footer a {
      color: var(--dark);
      text-decoration: none;
      font-weight: 800;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes coinEnter {
      0% { opacity: 0; transform: translateY(-18px) rotate(-14deg) scale(.86); }
      68% { opacity: 1; transform: translateY(2px) rotate(3deg) scale(1.09); }
      100% { opacity: 1; transform: translateY(0) rotate(0) scale(1); }
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(1); opacity: .55; }
      50% { transform: scale(1.75); opacity: 1; }
    }

    @keyframes pulseDot {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.45); }
    }

    @keyframes floatGlow {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(28px, -34px, 0) scale(1.12); }
    }

    @keyframes circuitDrift {
      from { opacity: .52; transform: translateY(0); }
      to { opacity: .9; transform: translateY(-18px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 1120px) {
      header {
        grid-template-columns: auto auto;
      }

      nav {
        display: none;
      }

      .nav-button {
        justify-self: end;
      }

      .service-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 18px 0;
      }

      .service:nth-child(2) {
        border-right: 0;
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 28px, 1440px);
      }

      .page::before,
      .page::after {
        opacity: 0.25;
        top: 330px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
      }

      .brand-text {
        font-size: 1.65rem;
      }

      .nav-button {
        min-height: 42px;
        padding: 0 15px;
        border-radius: 12px;
        font-size: 0.9rem;
      }

      .hero {
        min-height: auto;
        padding: 74px 0 78px;
      }

      .hero-logo {
        font-size: clamp(4.2rem, 17vw, 7rem);
      }

      .hero-logo .app-dot {
        display: block;
        margin: 0.18em 0 0;
        font-size: 0.34em;
        letter-spacing: -0.02em;
      }

      .slogan {
        margin-top: 28px;
        font-size: clamp(1.25rem, 7vw, 2rem);
        letter-spacing: 0.2em;
      }

      .hero-actions {
        gap: 14px;
      }

      .button {
        width: 100%;
        min-width: 0;
      }

      .services-band {
        border-radius: 24px 24px 0 0;
        padding: 34px 18px 42px;
      }

      .service-grid {
        grid-template-columns: 1fr;
      }

      .service,
      .service:nth-child(2),
      .service:nth-child(4) {
        grid-template-columns: 68px 1fr;
        gap: 18px;
        padding: 22px 12px;
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.18);
      }

      .service:last-child {
        border-bottom: 0;
      }

      .service-icon {
        width: 68px;
        height: 68px;
      }

      .service-icon svg {
        width: 34px;
        height: 34px;
      }

      footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 440px) {
      .brand-text {
        font-size: 1.35rem;
      }

      .nav-button span {
        display: none;
      }

      .nav-button {
        width: 44px;
        min-width: 44px;
        padding: 0;
      }

      .hero-logo {
        font-size: clamp(3.35rem, 19vw, 4.8rem);
      }

      .slogan::before,
      .slogan::after {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <main id="top" class="hero">
      <span class="spark one" aria-hidden="true"></span>
      <span class="spark two" aria-hidden="true"></span>
      <span class="spark three" aria-hidden="true"></span>
      <span class="spark four" aria-hidden="true"></span>

      <div>
        <h1 class="hero-logo" aria-label="Kuhching.app">
          Kuh<span class="cent-ch" aria-hidden="true"><span class="cent-h"></span></span>ing<span class="app-dot">.app</span>
        </h1>

        <div class="slogan">Simple solutions</div>

    <footer>
      <span>© <span id="year"></span> Kuhching.app. Simple solutions.</span>
      <a href="mailto:hello@kuhching.app">Connect@kuhching.app</a>
    </footer>
  </div>

  <script>
  </script>
</body>
</html>
